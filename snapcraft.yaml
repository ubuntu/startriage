name: startriage
summary: Unified triage tool for Ubuntu bugs, documentation, and forum posts
description: |
  startriage is a unified triage tool for Ubuntu developer teams.
  It combines bug triage (Launchpad), documentation triage (GitHub),
  and forum post triage (Discourse) into a single command.

  Run daily triage with:
    startriage list -t ubuntu-server

  For weekly bug housekeeping:
    startriage list todo -t ubuntu-server

  Configuration is read from ~/.config/startriage.toml.

base: core24
type: app
version: git
confinement: strict
grade: beta

apps:
  startriage:
    command: bin/startriage
    plugs:
      - network
      - network-bind
      - home

parts:
  startriage:
    plugin: python
    source: https://github.com/ubuntu/startriage
    source-type: git
