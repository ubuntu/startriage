name: startriage
summary: Unified triage tool for Ubuntu bugs, documentation, and forum posts
description: |
  startriage is a unified triage tool for Ubuntu developer teams.
  It combines several triage sources: Launchpad, GitHub, Discourse, proposed-migration, ... into a single command.

  Run daily triage with:
    startriage triage

  For bug housekeeping:
    startriage todo

  Configuration is read from ~/.config/startriage.toml.

base: core24
type: app
version: git
confinement: strict
grade: beta

apps:
  startriage:
    command: bin/startriage
    plugs:
      - network
      - network-bind
      - home

parts:
  startriage:
    plugin: python
    source: https://github.com/ubuntu/startriage
    source-type: git
